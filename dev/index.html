<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Easy Floorplan — local dev harness</title>
    <style>
      /* Home Assistant theme variables. The card/editor style many things with
         var(--primary-text-color) etc. WITHOUT fallbacks, so outside HA those
         resolve to nothing (e.g. wall stroke -> none -> invisible). Defining the
         common HA vars here makes the harness render like a real HA light theme. */
      :root {
        color-scheme: light;
        --primary-text-color: #212121;
        --secondary-text-color: #727272;
        --disabled-text-color: #bdbdbd;
        --primary-color: #03a9f4;
        --accent-color: #ff9800;
        --error-color: #db4437;
        --card-background-color: #ffffff;
        --primary-background-color: #fafafa;
        --secondary-background-color: #e5e5e5;
        --divider-color: rgba(0, 0, 0, 0.12);
      }
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #eceff1;
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding: 16px;
        box-sizing: border-box;
        min-height: 100vh;
      }
      /* Editor is the thing you interact with — give it the full width. */
      #editor-host { width: 100%; }
      /* Live preview is a smaller reference below the editor. */
      #card-pane { max-width: 720px; }
      .pane { min-width: 0; }
      .pane h2 {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #607d8b;
        margin: 0 0 8px;
      }
      #editor-host, #card-host, #tracker-emu, #opening-emu { background: #fff; border-radius: 8px; }
      #opening-emu { padding: 8px 12px; display: flex; flex-direction: column; gap: 6px; }
      #opening-emu .op-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; }
      #opening-emu .op-row .ent { color: #607d8b; font-family: ui-monospace, monospace; font-size: 12px; }
      #opening-emu label.op-toggle { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: #455a64; }
      #card-host { padding: 12px; }
      #tracker-emu {
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        font-size: 13px;
      }
      #tracker-emu .tracker-panel {
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        padding: 8px 10px;
      }
      #tracker-emu .tracker-panel header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }
      #tracker-emu .tracker-panel header strong { font-size: 12px; color: #455a64; }
      #tracker-emu .axis-row { display: grid; grid-template-columns: 110px 1fr 60px; gap: 6px; align-items: center; }
      #tracker-emu .axis-row .ent { color: #607d8b; font-family: ui-monospace, monospace; font-size: 12px; }
      #tracker-emu label.orbit { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: #455a64; }
      .note {
        grid-column: 1 / -1;
        font-size: 12px;
        color: #607d8b;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <p class="note">
      Local dev harness — edits in the editor update the live preview instantly.
      No Home Assistant, no service-worker cache. Hot-reloads on source changes.
    </p>
    <div class="pane">
      <h2>Editor</h2>
      <div id="editor-host"></div>
    </div>
    <div class="pane" id="card-pane">
      <h2>Live card preview</h2>
      <div id="card-host"></div>
    </div>
    <div class="pane" id="opening-emu-pane" style="max-width:720px;display:none;">
      <h2>Opening emulator (dev only)</h2>
      <div id="opening-emu"></div>
    </div>
    <div class="pane" id="tracker-emu-pane" style="max-width:720px;display:none;">
      <h2>Tracker emulator (dev only)</h2>
      <div id="tracker-emu"></div>
    </div>
    <script type="module" src="./dev.ts"></script>
  </body>
</html>
